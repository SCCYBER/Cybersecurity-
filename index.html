<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCCYBER Social Engineering Challenge</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="arcade-icons">
    <div class="icon skull skull1">☠</div>
    <div class="icon skull skull2">☠</div>
    <div class="icon shield shield1">🛡</div>
    <div class="icon shield shield2">🛡</div>
  </div>

  <div class="virus-layer">
    <div class="virus v1"></div>
    <div class="virus v2"></div>
    <div class="virus v3"></div>
    <div class="virus v4"></div>
  </div>

  <div class="game">

    <img src="logo.png" class="logo" alt="SCCYBER logo">

    <h1 class="title">SOCIAL ENGINEERING CHALLENGE</h1>

    <div class="hud">
      <div class="score" id="score">Score: 0 / 5</div>
      <div class="timer" id="timer">Time: 00:00</div>
    </div>

    <div class="questionBox" id="questionBox">
      <div class="tag" id="tag"></div>
      <h2 id="question"></h2>
      <div id="answers"></div>
      <div id="feedback" class="feedback"></div>
      <button id="nextBtn" class="nextBtn">NEXT</button>
    </div>

    <div class="result" id="result">
      <h2 id="resultHeading">MISSION COMPLETE</h2>
      <div id="finalScore"></div>
      <div id="resultMessage" class="resultMessage"></div>

      <div class="leaderboard-entry" id="leaderboardEntry" style="display:none;">
        <label for="playerName">ENTER NAME FOR LEADERBOARD</label>
        <input type="text" id="playerName" maxlength="7" placeholder="MAX 7" autocomplete="off">
        <button id="saveScoreBtn" class="nextBtn">SAVE SCORE</button>
      </div>

      <div class="leaderboard">
        <h3>TOP 10 FASTEST</h3>
        <ol id="leaderboardList"></ol>
      </div>

      <button onclick="location.reload()" class="nextBtn">PLAY AGAIN</button>
    </div>

  </div>

  <canvas id="confetti"></canvas>

  <script src="script.js"></script>
</body>
</html>
