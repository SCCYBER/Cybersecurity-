<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCCYBER Social Engineering Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-scanlines"></div>
  <div class="virus-layer">
    <div class="virus virus1"></div>
    <div class="virus virus2"></div>
    <div class="virus virus3"></div>
    <div class="virus virus4"></div>
    <div class="virus virus5"></div>
  </div>

  <main class="game-shell">
    <div class="top-bar">
      <div class="score-box" id="scoreBox">SCORE: 0 / 5</div>
      <div class="timer-box" id="timerBox">TIME: 00:00</div>
    </div>

    <section class="hero-card">
      <img src="logo.png" alt="SCCYBER logo" class="logo" />
      <h1 class="arcade-title">SOCIAL ENGINEERING CHALLENGE</h1>
      <p class="subtitle">Pick the safest response in each scenario</p>
    </section>

    <section class="game-card">
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="question-count" id="questionCount">SCENARIO 1 OF 5</div>
      </div>

      <div id="questionArea">
        <div class="scenario-tag" id="scenarioTag">PHISHING</div>
        <h2 class="question-title" id="questionTitle"></h2>
        <p class="question-text" id="questionText"></p>
        <div class="answers" id="answers"></div>
        <div class="feedback" id="feedback"></div>
      </div>

      <button id="nextBtn" class="next-btn" style="display: none;">NEXT SCENARIO</button>
    </section>

    <section class="result-card" id="resultCard" style="display: none;">
      <img src="logo.png" alt="SCCYBER logo" class="logo result-logo" />
      <h2 class="arcade-title result-title">MISSION COMPLETE</h2>
      <div class="final-score" id="finalScore"></div>
      <p class="result-text" id="resultText"></p>
      <button class="next-btn" onclick="location.reload()">PLAY AGAIN</button>
    </section>
  </main>

  <canvas id="confettiCanvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
